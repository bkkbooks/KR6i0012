body:
  text: 大唐三藏法師玄奘奉詔譯如是我聞一時佛薄伽梵在室羅筏住誓多林給孤獨園與無量無數聲聞菩薩摩訶薩俱及諸天人阿素洛等一切大衆前後圍繞爾時世尊告舍利子吾今愍念一切有情略説受持七佛名號所生功德令受持者當獲殊勝利益安樂汝應諦聽極善思惟吾當為汝分別解説舍利子言唯然世尊願樂欲聞佛告舍利子於此東方有一佛土名曰離垢衆德莊嚴彼土有佛名日輪遍照吉祥如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸大衆説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者便超百千俱胝大劫生死長夜流轉劇苦隨在所生常識宿命有能受持彼佛名者不失如前所獲功德復於百千俱胝大劫隨所生處心離愚癡於天人中受諸妙樂有能建立彼佛形像供養恭敬尊重讚歎不失如前所獲功德復於無量俱胝大劫隨在所生常得值佛速證無上正等菩提復次舍利子於此東方復有佛土名曰妙覺衆德莊嚴彼土有佛名妙功德住吉祥如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸天人説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者便得超越一切八難隨在所生常識宿命有能受持彼佛名者不失如前所獲功德復於無量俱胝大劫隨在所生心常聰慧恆居善趣受諸妙樂有能建立彼佛形像恭敬供養尊重讚歎不失如前所獲功德復於無量俱胝大劫隨在所生常得值佛修行一切波羅蜜多成大導師度無量衆復次舍利子於此東方復有佛土名衆生主彼土有佛名一寶蓋王如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸大衆説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者便得遠離一切憂苦祿位財寶無有退失唯除宿世定惡業因有能受持彼佛名者不失如前所獲功德隨在所生具大威德神通自在身帶光明形貌端嚴衆所樂見有能建立彼佛形像供養恭敬尊重讚歎不失如前所獲功德復於無量俱胝大劫常不枉生無佛世界修菩薩行大誓莊嚴成無上覺饒益一切復次舍利子於此東方復有佛土名自在力彼土有佛名善逝定迹如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸大衆説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者心便寂靜離諸喧雜有能受持彼佛名者不失如前所獲功德復於無量俱胝大劫隨所生處身四威儀若語若默心常在定有能建立彼佛形像供養恭敬尊重讚歎不失如前所獲功德復於無量俱胝大劫隨在所生常得值佛速能究竟諸等持門成兩足尊度無量衆復次舍利子於此東方復有佛土名最勝寶彼土有佛名寶華光吉祥如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸大衆説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者便得具足勝念慧行處四衆中説法無畏言詞威肅聞皆敬受有能受持彼佛名者不失如前所獲功德復於無量俱胝大劫隨在所生具念慧行成猛利智得勝聞持有能建立彼佛形像供養恭敬尊重讚歎不失如前所獲功德復於無量俱胝大劫隨所生處常值如來辨才無礙廣宣妙法漸次修習福慧資糧成天人尊度無量衆復次舍利子於此南方有一佛土名寂靜珠彼土有佛名超無邊迹如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸大衆説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者其心泰然無所擾亂有能受持彼佛名者不失如前所獲功德復能速證月光勝定證此定已尋復能證殑伽沙等三摩地門有能建立彼佛形像供養恭敬尊重讚歎不失如前所獲功德復於諸佛所説法門能遍受持深達義趣照了無礙如日光明隨在所生常得值佛因以速證無上菩提復次舍利子於此南方復有佛土名最上香彼土有佛名妙香王如來應正等覺明行圓滿善逝世間解無上丈夫調御士天人師佛薄伽梵今現在彼哀愍世間為諸大衆説微妙法開示初善中善後善文義巧妙純一圓滿清白梵行若有得聞彼佛名者身心調暢離諸麁重惡業消滅煩惱輕微有能受持彼佛名者不失如前所獲功德復於來世隨在所生具三十二大丈夫相一切有情同所瞻仰有能建立彼佛形像供養恭敬尊重讚歎不失如前所獲功德復於來世隨在所生常得出家具清淨戒遊諸佛土聞法受持具足修行一切功德由是速證阿耨多羅三藐三菩提佛告舍利子若諸有情得聞如是七佛名號受持供養必獲如前所説功德所以者何如是七佛名號色像皆由本願大悲所成故令衆生聞持供養皆獲如是利益安樂時薄伽梵説是經已舍利子等諸大聲聞及諸菩薩摩訶薩并諸天人阿素洛等一切大衆聞佛所説皆大歡喜信受奉行
